workflows:
  native-android-build:
    name: Entrance Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Fix Corrupt Gradle Wrapper
        script: |
          # This deletes the broken file and downloads a fresh one from the official Gradle site
          rm -f gradle/wrapper/gradle-wrapper.jar
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar
      - name: Set permissions
        script: | 
          chmod +x gradlew
      - name: Build Android APK
        script: | 
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - bereket.wmicheal.g@gmail.COM
