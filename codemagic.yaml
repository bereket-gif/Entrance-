workflows:
  native-android-build:
    name: Entrance Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Final Build
        script: |
          # 1. Delete the broken local files completely
          rm -rf gradle .gradle gradlew gradlew.bat
          
          # 2. Use the professional Gradle installed on the server
          gradle assembleDebug --no-daemon
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
    publishing:
      email:
        recipients:
          - bereket.wmicheal.g@gmail.COM
