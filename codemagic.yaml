workflows:
  native-android-build:
    name: Entrance Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build with System Gradle
        script: |
          # 1. Delete all the broken local gradle files
          rm -rf gradle .gradle gradlew gradlew.bat
          
          # 2. Use the system's global gradle to build directly
          # We use --no-daemon to prevent memory issues on mobile builds
          gradle assembleDebug --no-daemon
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
    publishing:
      email:
        recipients:
          - bereket.wmicheal.g@gmail.COM
