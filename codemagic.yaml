# Codemagic configuration for the Entrance- project
workflows:
  android-apk-workflow:
    name: Entrance Android APK Build
    instance_type: mac_mini_m1 
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter dependencies
        script: | 
          # Move into the folder where the Flutter code lives
          cd flutter_project
          flutter packages pub get
      - name: Build Android APK
        script: | 
          # Build a release APK without needing a signing key
          cd flutter_project
          flutter build apk --release --no-codesign
    artifacts:
      - flutter_project/build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - YOUR_EMAIL_HERE@GMAIL.COM # <--- CHANGE THIS TO YOUR EMAIL
