workflows:
  native-android-build:
    name: Entrance Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Repair and Generate Gradle Wrapper
        script: |
          # This use the system gradle to fix your broken project files
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
      - name: Build Android APK
        script: | 
          ./gradlew assembleDebug
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
    publishing:
      email:
        recipients:
          - bereket.wmicheal.g@gmail.COM
