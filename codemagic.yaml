workflows:
  native-android-build:
    name: Entrance Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Super Build
        script: |
          # 1. Delete everything that is broken
          rm -rf gradle .gradle gradlew gradlew.bat
          
          # 2. Build the app using the system's professional Gradle
          # We target the ':app' module specifically
          gradle :app:assembleDebug --no-daemon
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
    publishing:
      email:
        recipients:
          - bereket.wmicheal.g@gmail.com
